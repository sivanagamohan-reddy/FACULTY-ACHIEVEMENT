<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Faculty Tracker | Professional Achievement Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <header class="topbar sticky-top">
    <div class="container-xl d-flex align-items-center justify-content-between py-3">
      <div class="d-flex align-items-center gap-3">
        <button id="header-back" class="header-back-btn d-none" aria-label="Back to dashboard">
          <i class="bi bi-arrow-left"></i>
        </button>
        <div class="brand">Faculty Tracker</div>
      </div>
      <div class="d-flex align-items-center gap-2">
        <div id="header-admin-actions" class="d-flex align-items-center gap-2 d-none"></div>
        <button id="header-menu" class="header-menu-btn d-none" type="button" aria-label="Open navigation">
          <i class="bi bi-list"></i>
        </button>
        <button id="header-avatar" class="avatar d-none" type="button" title="My Profile" aria-label="My Profile">AA</button>
      </div>
    </div>
  </header>

  <main class="container-xl py-4" id="app"></main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script type="module" src="app.js?v=20260301-1"></script>
</body>
</html>
